name: Upstream Merge

# Keeps the fork current with cosmic-comp by MERGING upstream into our history
# (not rebasing our commits onto upstream). A long-lived fork has many of its
# own commits; rebasing replays all of them every run and the same conflicts
# resurface. A merge resolves only the genuine delta once and preserves history.
# See PORTING.md.

on:
  schedule:
    # Every Monday at 06:00 UTC.
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # A PAT or GitHub App token (secret UPSTREAM_MERGE_TOKEN), NOT the
          # default GITHUB_TOKEN: PRs opened with the default token do not
          # trigger CI (GitHub loop-prevention), so the merge would never get
          # built. Falls back to GITHUB_TOKEN if the secret is unset (the PR
          # opens, but its CI must then be kicked manually).
          token: ${{ secrets.UPSTREAM_MERGE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: System deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwayland-dev libxkbcommon-dev libudev-dev libinput-dev \
            libgbm-dev libseat-dev libpixman-1-dev libdisplay-info-dev \
            protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream + fetch
        run: |
          git remote add upstream https://github.com/pop-os/cosmic-comp
          git fetch upstream master

      - name: Attempt merge
        id: merge
        run: |
          BRANCH="upstream-merge-$(date +%Y-%m-%d)"
          UPSTREAM_HASH=$(git rev-parse upstream/master)
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "upstream_hash=$UPSTREAM_HASH" >> "$GITHUB_OUTPUT"

          # Nothing new upstream -> nothing to do.
          if [ "$(git rev-list master..upstream/master --count)" -eq 0 ]; then
            echo "status=noop" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git checkout -b "$BRANCH"
          if git merge --no-edit upstream/master; then
            echo "status=merged" >> "$GITHUB_OUTPUT"
          else
            CONFLICTS=$(git diff --name-only --diff-filter=U | tr '\n' ' ')
            echo "status=conflict" >> "$GITHUB_OUTPUT"
            echo "conflicts=$CONFLICTS" >> "$GITHUB_OUTPUT"
            # Keep the half-merged branch (conflict markers committed) so the
            # resolution work is not thrown away; a human finishes it.
            git add -A
            git commit --no-edit -m "WIP upstream merge $(date +%Y-%m-%d) (conflicts to resolve)" || true
            git push origin "$BRANCH" || true
          fi

      - name: Build + integration guard (clean merge)
        id: verify
        if: steps.merge.outputs.status == 'merged'
        run: |
          # The fork builds with --lib (the test-client bin has optional deps).
          if ! cargo build --lib; then
            echo "status=build-failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Integration guard: the Arlen seams the merge must not have dropped.
          # A merge that compiles but drops a seam fails here. (PORTING.md lists
          # the seams; keep this in sync.)
          MISSING=""
          # Event-Bus producer socket.
          grep -q "/run/arlen/event-bus-producer.sock" src/event_bus.rs || MISSING="$MISSING event-bus-socket"
          # All FIVE protocol interfaces desktop-shell binds, anchored to the
          # actual <interface name="..."> declaration (a comment or arg
          # reference must not satisfy it).
          for iface in arlen_shell_overlay_v1 arlen_titlebar_v1 arlen_titlebar_manager_v1 \
                       arlen_window_attach_manager_v1 arlen_window_attachment_v1; do
            grep -rqF "interface name=\"$iface\"" resources/protocols/ || MISSING="$MISSING $iface"
          done
          # The shared-crate theme source (not a vendored copy or a stray path).
          grep -q "arlen_theme::DARK_TOML" src/theme.rs || MISSING="$MISSING theme-dark-source"
          grep -q "arlen_theme::LIGHT_TOML" src/theme.rs || MISSING="$MISSING theme-light-source"
          if [ -n "$MISSING" ]; then
            echo "missing=$MISSING" >> "$GITHUB_OUTPUT"
            echo "status=guard-failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "status=ok" >> "$GITHUB_OUTPUT"

      - name: Open PR (verified merge)
        if: steps.verify.outputs.status == 'ok'
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_MERGE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.merge.outputs.branch }}"
          git push origin "$BRANCH"
          gh pr list --label "upstream-merge" --state open --json number \
            --jq '.[].number' | while read -r pr; do
            gh pr close "$pr" --comment "Superseded by a newer upstream merge."
          done
          gh pr create \
            --title "Upstream merge $(date +%Y-%m-%d)" \
            --body "Automated weekly merge of \`upstream/master\` at \`${{ steps.merge.outputs.upstream_hash }}\`. Built with \`cargo build --lib\` and passed the Arlen integration guard (Event-Bus socket + protocol interface names). See PORTING.md." \
            --label "upstream-merge" --head "$BRANCH" --base "master"

      - name: Open issue (conflict, build, or guard failure)
        if: steps.merge.outputs.status == 'conflict' || steps.verify.outputs.status == 'build-failed' || steps.verify.outputs.status == 'guard-failed'
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_MERGE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          gh issue list --label "upstream-merge-blocked" --state open --json number \
            --jq '.[].number' | while read -r issue; do
            gh issue close "$issue" --comment "Superseded by a newer report."
          done
          REASON="conflicts: ${{ steps.merge.outputs.conflicts }}"
          [ "${{ steps.verify.outputs.status }}" = "build-failed" ] && REASON="merge built but \`cargo build --lib\` failed"
          [ "${{ steps.verify.outputs.status }}" = "guard-failed" ] && REASON="merge built but dropped Arlen seams:${{ steps.verify.outputs.missing }}"
          gh issue create \
            --title "Upstream merge blocked $(date +%Y-%m-%d)" \
            --body "Weekly merge of \`upstream/master\` at \`${{ steps.merge.outputs.upstream_hash }}\` could not auto-land. ${REASON}. Branch \`${{ steps.merge.outputs.branch }}\` (if pushed) holds the work in progress. See PORTING.md for the resolution process." \
            --label "upstream-merge-blocked"
